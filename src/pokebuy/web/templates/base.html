<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}PokeBuy{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
    <script src="https://unpkg.com/htmx.org@2.0.7" defer></script>
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="/">PokeBuy</a>
      <nav class="nav" aria-label="Primary">
        <a href="/" class="{% if active_nav == 'dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/products" class="{% if active_nav == 'products' %}active{% endif %}">Products</a>
        <a href="/settings" class="{% if active_nav == 'settings' %}active{% endif %}">Settings</a>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
